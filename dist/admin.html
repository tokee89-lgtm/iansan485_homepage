<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 관리 | 경기도지체장애인협회 안산시지회</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #f3f4f6; }

    .admin-wrapper {
      margin-top: 80px;
      min-height: calc(100vh - 80px);
      padding: 40px 0 80px;
    }

    /* Login Gate */
    .login-gate {
      max-width: 440px;
      margin: 60px auto;
      background: white;
      border-radius: 16px;
      padding: 50px 40px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    .login-gate .lock-icon {
      width: 72px;
      height: 72px;
      background: rgba(26,79,139,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: var(--primary-color);
      margin: 0 auto 24px;
    }
    .login-gate h2 { font-size: 1.5rem; color: var(--dark-color); margin-bottom: 8px; }
    .login-gate p { color: var(--text-muted); margin-bottom: 32px; font-size: 0.95rem; }
    .login-gate input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      outline: none;
    }
    .login-gate input:focus { border-color: var(--primary-color); }
    .login-gate button {
      width: 100%;
      padding: 14px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-gate button:hover { background: #123b6c; }
    .login-error { color: #ef4444; font-size: 0.9rem; margin-top: 12px; display: none; }

    /* Admin Panel */
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }

    .admin-header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 20px 0;
      margin-bottom: 32px;
    }
    .admin-header .container { display: flex; justify-content: space-between; align-items: center; }
    .admin-header h1 { font-size: 1.5rem; color: var(--dark-color); }
    .admin-header .actions { display: flex; gap: 12px; }

    .tab-bar {
      display: flex;
      gap: 4px;
      background: white;
      padding: 6px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 28px;
      width: fit-content;
    }
    .tab-btn {
      padding: 10px 24px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--primary-color);
      color: white;
      box-shadow: 0 2px 8px rgba(26,79,139,0.3);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Write Form */
    .write-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .form-group { margin-bottom: 24px; }
    .form-group label {
      display: block;
      font-weight: 600;
      color: var(--dark-color);
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
    .form-group label span { color: #ef4444; margin-left: 2px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text-main);
      transition: border-color 0.2s;
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--primary-color); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    .image-upload-area {
      border: 2px dashed #d1d5db;
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .image-upload-area:hover { border-color: var(--primary-color); background: rgba(26,79,139,0.02); }
    .image-upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%; border: none; padding: 0;
    }
    .image-upload-area i { font-size: 2rem; color: var(--gray-medium); margin-bottom: 10px; }
    .image-upload-area p { color: var(--text-muted); margin: 0; font-size: 0.9rem; }
    .image-preview { display: none; margin-top: 12px; }
    .image-preview img { max-height: 200px; border-radius: 8px; border: 1px solid #e5e7eb; }

    /* Editor Toolbar */
    .editor-toolbar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      padding: 10px;
      border: 1.5px solid #e5e7eb;
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      background: #f9fafb;
    }
    .toolbar-btn {
      width: 34px;
      height: 34px;
      border: 1px solid #e5e7eb;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--dark-color);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .toolbar-btn:hover { background: var(--primary-color); color: white; border-color: var(--primary-color); }
    .toolbar-separator { width: 1px; background: #e5e7eb; margin: 4px 2px; }
    .toolbar-select {
      padding: 0 10px;
      height: 34px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.85rem;
      background: white;
      cursor: pointer;
      outline: none;
    }
    #content-editor {
      min-height: 300px;
      border: 1.5px solid #e5e7eb;
      border-radius: 0 0 10px 10px;
      padding: 20px;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.8;
      outline: none;
      transition: border-color 0.2s;
    }
    #content-editor:focus { border-color: var(--primary-color); }
    #content-editor:empty::before {
      content: attr(data-placeholder);
      color: #9ca3af;
    }

    .btn-group { display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px; }
    .admin-btn {
      padding: 12px 28px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-save { background: var(--primary-color); color: white; }
    .btn-save:hover { background: #123b6c; }
    .btn-cancel { background: #f3f4f6; color: var(--text-main); }
    .btn-cancel:hover { background: #e5e7eb; }
    .btn-preview { background: rgba(26,79,139,0.1); color: var(--primary-color); }
    .btn-preview:hover { background: rgba(26,79,139,0.2); }

    /* Post List */
    .post-list-table {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .post-list-table table {
      width: 100%;
      border-collapse: collapse;
    }
    .post-list-table th {
      background: var(--gray-light);
      padding: 14px 20px;
      text-align: left;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
      border-bottom: 1px solid #e5e7eb;
    }
    .post-list-table td {
      padding: 16px 20px;
      border-bottom: 1px solid #f3f4f6;
      font-size: 0.95rem;
      vertical-align: middle;
    }
    .post-list-table tr:last-child td { border-bottom: none; }
    .post-list-table tr:hover td { background: #fafafa; }
    .post-source-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-local { background: rgba(26,79,139,0.1); color: var(--primary-color); }
    .badge-naver { background: rgba(3,199,90,0.12); color: #039855; }
    .post-actions { display: flex; gap: 8px; }
    .action-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-edit { background: rgba(26,79,139,0.1); color: var(--primary-color); }
    .btn-edit:hover { background: var(--primary-color); color: white; }
    .btn-delete { background: rgba(239,68,68,0.1); color: #ef4444; }
    .btn-delete:hover { background: #ef4444; color: white; }
    .btn-view { background: #f3f4f6; color: var(--text-main); }
    .btn-view:hover { background: #e5e7eb; }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .stat-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }
    .stat-icon.blue { background: rgba(26,79,139,0.1); color: var(--primary-color); }
    .stat-icon.green { background: rgba(3,199,90,0.1); color: #039855; }
    .stat-icon.yellow { background: rgba(247,171,27,0.15); color: #d97706; }
    .stat-label { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 4px; }
    .stat-number { font-size: 1.8rem; font-weight: 700; color: var(--dark-color); }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--dark-color);
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 9999;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #059669; }
    .toast.error { background: #ef4444; }

    /* Preview Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 40px;
      transform: translateY(20px);
      transition: transform 0.3s;
    }
    .modal-overlay.active .modal-box { transform: translateY(0); }
    .modal-close { float: right; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
    .modal-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
    .modal-date { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 24px; }
    .modal-body { line-height: 1.9; font-size: 1.05rem; }
    .modal-img { width: 100%; border-radius: 12px; margin-bottom: 24px; max-height: 350px; object-fit: cover; }

    @media (max-width: 768px) {
      .form-row { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: 1fr; }
      .write-card { padding: 24px 16px; }
      .admin-header .container { flex-direction: column; gap: 12px; align-items: flex-start; }
      .post-list-table { overflow-x: auto; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="container header-container">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="경기도지체장애인협회" class="logo-img">
        <div class="logo-divider"></div>
        <div class="logo-branch-text">안산시지회</div>
      </a>
      <div class="menu-toggle">
        <span></span><span></span><span></span>
      </div>
      <nav>
        <ul>
          <li><a href="index.html">홈</a></li>
          <li><a href="about.html">기관 소개</a></li>
          <li><a href="projects.html">주요 사업</a></li>
          <li><a href="news.html" class="active">알림마당</a></li>
          <li><a href="location.html">오시는 길</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="admin-wrapper">
    <!-- Login Gate -->
    <div class="container" id="login-section">
      <div class="login-gate">
        <div class="lock-icon"><i class="fa-solid fa-lock"></i></div>
        <h2>관리자 로그인</h2>
        <p>게시글 관리 페이지는 관리자만 접근할 수 있습니다.</p>
        <input type="password" id="admin-pw" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
        <button onclick="doLogin()"><i class="fa-solid fa-right-to-bracket" style="margin-right:8px;"></i>로그인</button>
        <p class="login-error" id="login-error">비밀번호가 올바르지 않습니다.</p>
      </div>
    </div>

    <!-- Admin Panel (hidden until login) -->
    <div id="admin-section" class="admin-panel">
      <div class="admin-header">
        <div class="container">
          <h1><i class="fa-solid fa-pen-to-square" style="color: var(--primary-color); margin-right: 10px;"></i>게시글 관리자</h1>
          <div class="actions">
            <a href="news.html" class="admin-btn btn-cancel" style="text-decoration:none; display:inline-flex; align-items:center; gap:6px;">
              <i class="fa-solid fa-arrow-left"></i> 알림마당으로
            </a>
            <button class="admin-btn btn-save" onclick="showTab('write')">
              <i class="fa-solid fa-plus"></i> 새 글 작성
            </button>
          </div>
        </div>
      </div>

      <div class="container">
        <!-- Stats -->
        <div class="stats-bar">
          <div class="stat-card">
            <div class="stat-icon blue"><i class="fa-solid fa-file-lines"></i></div>
            <div>
              <div class="stat-label">전체 게시물</div>
              <div class="stat-number" id="stat-total">-</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon blue"><i class="fa-solid fa-pencil"></i></div>
            <div>
              <div class="stat-label">직접 작성</div>
              <div class="stat-number" id="stat-local">-</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green"><i class="fa-brands fa-naver"></i></div>
            <div>
              <div class="stat-label">네이버 블로그</div>
              <div class="stat-number" id="stat-naver">-</div>
            </div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tab-bar">
          <button class="tab-btn active" id="tab-list-btn" onclick="showTab('list')">
            <i class="fa-solid fa-list" style="margin-right:6px;"></i>게시글 목록
          </button>
          <button class="tab-btn" id="tab-write-btn" onclick="showTab('write')">
            <i class="fa-solid fa-pen" style="margin-right:6px;"></i>새 글 작성
          </button>
        </div>

        <!-- Tab: Post List -->
        <div class="tab-content active" id="tab-list">
          <div class="post-list-table">
            <table>
              <thead>
                <tr>
                  <th style="width:50px;">No.</th>
                  <th>제목</th>
                  <th style="width:100px;">출처</th>
                  <th style="width:120px;">카테고리</th>
                  <th style="width:110px;">작성일</th>
                  <th style="width:160px;">관리</th>
                </tr>
              </thead>
              <tbody id="post-table-body">
                <tr><td colspan="6" style="text-align:center; padding:40px; color:var(--text-muted);">
                  <i class="fa-solid fa-spinner fa-spin"></i> 불러오는 중...
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Tab: Write Post -->
        <div class="tab-content" id="tab-write">
          <div class="write-card">
            <input type="hidden" id="edit-post-id" value="">
            <div class="form-row">
              <div class="form-group">
                <label>카테고리 <span>*</span></label>
                <select id="post-category">
                  <option value="안산시지회 뉴스">안산시지회 뉴스</option>
                  <option value="장애어르신 쉼마루">장애어르신 쉼마루</option>
                  <option value="장애인복지정보">장애인복지정보</option>
                  <option value="공지사항">공지사항</option>
                </select>
              </div>
              <div class="form-group">
                <label>작성일</label>
                <input type="date" id="post-date">
              </div>
            </div>
            <div class="form-group">
              <label>제목 <span>*</span></label>
              <input type="text" id="post-title" placeholder="게시글 제목을 입력하세요">
            </div>
            <div class="form-group">
              <label>대표 이미지</label>
              <div class="image-upload-area" id="upload-area">
                <input type="file" id="post-image-file" accept="image/*" onchange="previewImage(this)">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <p>이미지를 클릭하거나 드래그하여 업로드하세요</p>
                <p style="font-size:0.8rem; color: #9ca3af; margin-top:4px;">JPG, PNG, GIF (최대 5MB)</p>
              </div>
              <div class="image-preview" id="image-preview-box">
                <img id="image-preview-img" src="" alt="미리보기">
                <button onclick="clearImage()" style="margin-top:8px; background:#f3f4f6; border:none; padding:6px 14px; border-radius:6px; cursor:pointer; font-family:inherit;">
                  <i class="fa-solid fa-xmark"></i> 이미지 제거
                </button>
              </div>
            </div>
            <div class="form-group">
              <label>본문 내용 <span>*</span></label>
              <div class="editor-toolbar">
                <select class="toolbar-select" onchange="execCmd('formatBlock', this.value); this.value=''">
                  <option value="">본문 스타일</option>
                  <option value="h2">제목 (H2)</option>
                  <option value="h3">소제목 (H3)</option>
                  <option value="h4">소소제목 (H4)</option>
                  <option value="p">본문</option>
                </select>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="execCmd('bold')" title="굵게"><i class="fa-solid fa-bold"></i></button>
                <button class="toolbar-btn" onclick="execCmd('italic')" title="기울임"><i class="fa-solid fa-italic"></i></button>
                <button class="toolbar-btn" onclick="execCmd('underline')" title="밑줄"><i class="fa-solid fa-underline"></i></button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="execCmd('justifyLeft')" title="왼쪽 정렬"><i class="fa-solid fa-align-left"></i></button>
                <button class="toolbar-btn" onclick="execCmd('justifyCenter')" title="가운데 정렬"><i class="fa-solid fa-align-center"></i></button>
                <button class="toolbar-btn" onclick="execCmd('justifyRight')" title="오른쪽 정렬"><i class="fa-solid fa-align-right"></i></button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="execCmd('insertUnorderedList')" title="글머리 기호"><i class="fa-solid fa-list-ul"></i></button>
                <button class="toolbar-btn" onclick="execCmd('insertOrderedList')" title="번호 목록"><i class="fa-solid fa-list-ol"></i></button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="insertLink()" title="링크 삽입"><i class="fa-solid fa-link"></i></button>
                <button class="toolbar-btn" onclick="insertHR()" title="구분선">—</button>
              </div>
              <div id="content-editor" contenteditable="true" data-placeholder="게시글 내용을 여기에 입력하세요..."></div>
            </div>
            <div class="btn-group">
              <button class="admin-btn btn-cancel" onclick="cancelWrite()">취소</button>
              <button class="admin-btn btn-preview" onclick="openPreview()"><i class="fa-regular fa-eye" style="margin-right:6px;"></i>미리보기</button>
              <button class="admin-btn btn-save" onclick="savePost()"><i class="fa-solid fa-floppy-disk" style="margin-right:6px;"></i>저장하기</button>
            </div>
          </div>
        </div>
      </div><!-- /container -->
    </div><!-- /admin-panel -->
  </div><!-- /admin-wrapper -->

  <!-- Preview Modal -->
  <div class="modal-overlay" id="preview-modal" onclick="closePreview(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closePreviewBtn()"><i class="fa-solid fa-xmark"></i></button>
      <div id="preview-image-wrap"></div>
      <div class="modal-title" id="preview-title"></div>
      <div class="modal-date" id="preview-date"></div>
      <hr style="margin-bottom:24px; border:none; border-top:2px solid var(--primary-color); width:80px;">
      <div class="modal-body" id="preview-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/newsData.js"></script>
  <script>
    // ── 비밀번호 (간단한 클라이언트 사이드 보안) ──────────────────────────
    const ADMIN_PW = 'iansan4519';

    function doLogin() {
      const pw = document.getElementById('admin-pw').value;
      const err = document.getElementById('login-error');
      if (pw === ADMIN_PW) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-section').classList.add('active');
        sessionStorage.setItem('admin_auth', '1');
        initAdmin();
      } else {
        err.style.display = 'block';
        document.getElementById('admin-pw').style.borderColor = '#ef4444';
      }
    }
    document.getElementById('admin-pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    // Auto-login if session exists
    if (sessionStorage.getItem('admin_auth') === '1') {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('admin-section').classList.add('active');
      initAdmin();
    }

    // ── localStorage 기반 로컬 게시물 관리 ───────────────────────────────
    function getLocalPosts() {
      return JSON.parse(localStorage.getItem('localPosts') || '[]');
    }
    function saveLocalPosts(posts) {
      localStorage.setItem('localPosts', JSON.stringify(posts));
    }
    function getAllPosts() {
      const local = getLocalPosts().map(p => ({ ...p, source: 'local' }));
      const naver = (typeof newsData !== 'undefined' ? newsData : []).map(p => ({ ...p, source: 'naver' }));
      return [...local, ...naver].sort((a, b) => b.id - a.id);
    }

    // ── Admin Init ────────────────────────────────────────────────────────
    function initAdmin() {
      setTodayDate();
      renderPostTable();
    }

    function setTodayDate() {
      const today = new Date();
      const y = today.getFullYear();
      const m = String(today.getMonth() + 1).padStart(2, '0');
      const d = String(today.getDate()).padStart(2, '0');
      document.getElementById('post-date').value = `${y}-${m}-${d}`;
    }

    // ── Tab Switching ─────────────────────────────────────────────────────
    function showTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      document.getElementById('tab-' + name + '-btn').classList.add('active');
      if (name === 'list') renderPostTable();
    }

    // ── Render Post Table ─────────────────────────────────────────────────
    function renderPostTable() {
      const posts = getAllPosts();
      const localPosts = getLocalPosts();
      const naverPosts = typeof newsData !== 'undefined' ? newsData : [];

      document.getElementById('stat-total').textContent = posts.length;
      document.getElementById('stat-local').textContent = localPosts.length;
      document.getElementById('stat-naver').textContent = naverPosts.length;

      const tbody = document.getElementById('post-table-body');
      if (posts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">게시물이 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = posts.map((post, idx) => `
        <tr>
          <td style="color:var(--text-muted);">${posts.length - idx}</td>
          <td style="font-weight:500; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${post.title}</td>
          <td>
            <span class="post-source-badge ${post.source === 'local' ? 'badge-local' : 'badge-naver'}">
              <i class="fa-solid ${post.source === 'local' ? 'fa-pencil' : 'fa-n'}"></i>
              ${post.source === 'local' ? '직접작성' : '네이버'}
            </span>
          </td>
          <td style="color:var(--text-muted);">${post.category || '기관소식'}</td>
          <td style="color:var(--text-muted);">${post.date}</td>
          <td>
            <div class="post-actions">
              ${post.source === 'local' ? `
                <button class="action-btn btn-edit" onclick="editPost(${post.id})">수정</button>
                <button class="action-btn btn-delete" onclick="deletePost(${post.id})">삭제</button>
              ` : `
                <a href="news_detail.html?id=${post.id}" class="action-btn btn-view" style="text-decoration:none;">보기</a>
              `}
            </div>
          </td>
        </tr>
      `).join('');
    }

    // ── Save Post ─────────────────────────────────────────────────────────
    let currentImageBase64 = '';

    function savePost() {
      const title = document.getElementById('post-title').value.trim();
      const content = document.getElementById('content-editor').innerHTML.trim();
      const category = document.getElementById('post-category').value;
      const dateVal = document.getElementById('post-date').value;
      const editId = document.getElementById('edit-post-id').value;

      if (!title) { showToast('제목을 입력해주세요.', 'error'); return; }
      if (!content || content === '') { showToast('내용을 입력해주세요.', 'error'); return; }

      const d = dateVal ? new Date(dateVal) : new Date();
      const formattedDate = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;

      const localPosts = getLocalPosts();
      let summary = content.replace(/<[^>]+>/g, '').trim().slice(0, 100);
      if (summary.length === 100) summary += '...';

      if (editId) {
        // Update existing
        const idx = localPosts.findIndex(p => p.id === parseInt(editId));
        if (idx > -1) {
          localPosts[idx] = { ...localPosts[idx], title, category, date: formattedDate, content, summary, image: currentImageBase64 || localPosts[idx].image };
          saveLocalPosts(localPosts);
          showToast('게시글이 수정되었습니다.', 'success');
        }
      } else {
        // New post
        const newId = Date.now();
        localPosts.unshift({ id: newId, title, category, date: formattedDate, image: currentImageBase64 || 'images/static/static_f0a251dd7c.jpg', summary, content });
        saveLocalPosts(localPosts);
        showToast('게시글이 저장되었습니다.', 'success');
      }

      cancelWrite();
      showTab('list');
    }

    // ── Edit Post ─────────────────────────────────────────────────────────
    function editPost(id) {
      const localPosts = getLocalPosts();
      const post = localPosts.find(p => p.id === id);
      if (!post) return;

      document.getElementById('edit-post-id').value = id;
      document.getElementById('post-title').value = post.title;
      document.getElementById('post-category').value = post.category || '기관소식';
      document.getElementById('content-editor').innerHTML = post.content;
      currentImageBase64 = post.image || '';
      if (currentImageBase64) {
        document.getElementById('image-preview-img').src = currentImageBase64;
        document.getElementById('image-preview-box').style.display = 'block';
      }

      showTab('write');
    }

    // ── Delete Post ───────────────────────────────────────────────────────
    function deletePost(id) {
      if (!confirm('이 게시글을 삭제하시겠습니까?')) return;
      const localPosts = getLocalPosts().filter(p => p.id !== id);
      saveLocalPosts(localPosts);
      renderPostTable();
      showToast('게시글이 삭제되었습니다.', 'success');
    }

    // ── Cancel Write ──────────────────────────────────────────────────────
    function cancelWrite() {
      document.getElementById('post-title').value = '';
      document.getElementById('content-editor').innerHTML = '';
      document.getElementById('edit-post-id').value = '';
      document.getElementById('post-category').value = '공지사항';
      clearImage();
      setTodayDate();
    }

    // ── Image Handling ────────────────────────────────────────────────────
    function previewImage(input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      if (file.size > 5 * 1024 * 1024) { showToast('이미지 크기는 5MB 이하여야 합니다.', 'error'); return; }
      const reader = new FileReader();
      reader.onload = e => {
        currentImageBase64 = e.target.result;
        document.getElementById('image-preview-img').src = e.target.result;
        document.getElementById('image-preview-box').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
    function clearImage() {
      currentImageBase64 = '';
      document.getElementById('image-preview-box').style.display = 'none';
      document.getElementById('image-preview-img').src = '';
      document.getElementById('post-image-file').value = '';
    }

    // ── Editor Commands ───────────────────────────────────────────────────
    function execCmd(cmd, val = null) {
      document.getElementById('content-editor').focus();
      document.execCommand(cmd, false, val);
    }
    function insertLink() {
      const url = prompt('링크 URL을 입력하세요:', 'https://');
      if (url) execCmd('createLink', url);
    }
    function insertHR() {
      execCmd('insertHTML', '<hr style="border:none;border-top:1px solid #e5e7eb;margin:20px 0;">');
    }

    // ── Preview Modal ─────────────────────────────────────────────────────
    function openPreview() {
      const title = document.getElementById('post-title').value || '(제목 없음)';
      const body = document.getElementById('content-editor').innerHTML;
      const dateVal = document.getElementById('post-date').value;
      const d = dateVal ? new Date(dateVal) : new Date();
      const formatted = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;

      document.getElementById('preview-title').textContent = title;
      document.getElementById('preview-date').innerHTML = `<i class="fa-regular fa-calendar"></i> ${formatted}`;
      document.getElementById('preview-body').innerHTML = body;

      if (currentImageBase64) {
        document.getElementById('preview-image-wrap').innerHTML = `<img src="${currentImageBase64}" class="modal-img" alt="대표이미지">`;
      } else {
        document.getElementById('preview-image-wrap').innerHTML = '';
      }
      document.getElementById('preview-modal').classList.add('active');
    }
    function closePreview(e) {
      if (e.target === document.getElementById('preview-modal'))
        document.getElementById('preview-modal').classList.remove('active');
    }
    function closePreviewBtn() {
      document.getElementById('preview-modal').classList.remove('active');
    }

    // ── Toast ─────────────────────────────────────────────────────────────
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type + ' show';
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
  <script src="js/main.js"></script>
</body>
</html>
