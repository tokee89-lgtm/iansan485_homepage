      if (localData) {
        try {
          data = JSON.parse(localData);
        } catch(e) {}
      }

      function setEl(id, val) {
        const el = document.getElementById(id);
        if (el && val !== undefined) el.innerHTML = val;
      }

      setEl('org-president', data.president?.name);
      setEl('org-director', data.director?.name);
      setEl('org-committee-name', data.level2?.committee?.name);
      setEl('org-committee-list', data.level2?.committee?.list);
      setEl('org-advisor', data.level2?.advisor?.name);
      setEl('org-vp', data.level2?.vp?.name);
      setEl('org-auditor', data.level2?.auditor?.name);
      setEl('org-sponsor', data.level2?.sponsor?.name);
      setEl('org-clubs', data.level2?.clubs?.list);

      if (data.centers) {
        for (let i=1; i<=6; i++) {
          const c = data.centers['center'+i];
          setEl('org-center'+i, c?.name || c?.list);
        }
      }

      if (data.branches) {
        for (let i=1; i<=21; i++) {
          setEl('org-b'+i, data.branches['b'+i]?.name);
        }
      }
    });
  </script>
</body>
</html>
